<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <meta name="robots" content="noindex">
    <link rel="canonical" href="https://docs.mozilla.ai/any-llm/api/completion/">
    <meta http-equiv="refresh" content="0; url=https://docs.mozilla.ai/any-llm/api/completion/">
    <script>
      const target = new URL("https://docs.mozilla.ai/any-llm/api/completion/");
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    </script>
  </head>
  <body>
    <p>This documentation moved to <a href="https://docs.mozilla.ai/any-llm/api/completion/">https://docs.mozilla.ai/any-llm/api/completion/</a>.</p>
  </body>
</html>
